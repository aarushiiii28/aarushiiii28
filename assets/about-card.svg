<svg width="700" height="480" viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" font-family="'Cascadia Code','Fira Code',Consolas,monospace">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#FF6584"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- outer glow border -->
  <rect x="4" y="4" width="692" height="472" rx="18" fill="none" stroke="url(#borderGrad)" stroke-width="2.5" opacity="0.85"/>

  <!-- main dark card -->
  <rect x="8" y="8" width="684" height="464" rx="15" fill="#0D1117"/>

  <!-- title bar -->
  <rect x="8" y="8" width="684" height="42" rx="15" fill="#161B22"/>
  <rect x="8" y="35" width="684" height="15" fill="#161B22"/>
  <circle cx="34" cy="29" r="6" fill="#FF5F56"/>
  <circle cx="54" cy="29" r="6" fill="#FFBD2E"/>
  <circle cx="74" cy="29" r="6" fill="#27C93F"/>
  <text x="350" y="34" fill="#8B949E" font-size="13" text-anchor="middle">aarushi@github: ~/about-me</text>

  <!-- prompt line -->
  <text x="30" y="78" font-size="15">
    <tspan fill="#3FB950">➜</tspan>
    <tspan fill="#79C0FF" dx="8">~</tspan>
    <tspan fill="#C9D1D9" dx="8">cat about_me.yaml</tspan>
  </text>

  <!-- yaml block -->
  <g font-size="14.5">
    <text x="30" y="112"><tspan fill="#FF6584">name</tspan><tspan fill="#8B949E">:</tspan><tspan fill="#C9D1D9" dx="8">Aarushi Vashisht</tspan></text>
    <text x="30" y="140"><tspan fill="#FF6584">role</tspan><tspan fill="#8B949E">:</tspan><tspan fill="#C9D1D9" dx="8">AI/ML Enthusiast &amp; Student Developer</tspan></text>
    <text x="30" y="168"><tspan fill="#FF6584">focus</tspan><tspan fill="#8B949E">:</tspan><tspan fill="#C9D1D9" dx="8">LLMs • RAG • Recommendation Systems • Full-Stack AI Apps</tspan></text>
    <text x="30" y="196"><tspan fill="#FF6584">currently_building</tspan><tspan fill="#8B949E">:</tspan><tspan fill="#C9D1D9" dx="8">things that make AI feel less like magic,</tspan></text>
    <text x="184" y="216" fill="#C9D1D9">more like a tool</text>
    <text x="30" y="244"><tspan fill="#3FB950">fun_fact</tspan><tspan fill="#8B949E">:</tspan><tspan fill="#C9D1D9" dx="8">probably debugging this at an hour</tspan></text>
    <text x="112" y="264" fill="#C9D1D9">I shouldn't be awake 🦂</text>
  </g>

  <!-- divider -->
  <line x1="30" y1="288" x2="670" y2="288" stroke="#21262D" stroke-width="1.5"/>

  <!-- second prompt -->
  <text x="30" y="316" font-size="15">
    <tspan fill="#3FB950">➜</tspan>
    <tspan fill="#79C0FF" dx="8">~</tspan>
    <tspan fill="#C9D1D9" dx="8">./highlights.sh</tspan>
  </text>

  <!-- bullet highlights -->
  <g font-size="14.5" fill="#C9D1D9">
    <text x="30" y="350"><tspan font-size="16">🔭</tspan><tspan dx="10">Currently building </tspan><tspan fill="#FF6584" font-weight="bold">full-stack AI applications</tspan><tspan> end-to-end</tspan></text>
    <text x="30" y="378"><tspan font-size="16">🧠</tspan><tspan dx="10">Deep-diving into </tspan><tspan fill="#79C0FF" font-weight="bold">LLMs, RAG pipelines &amp; recommendation systems</tspan></text>
    <text x="30" y="406"><tspan font-size="16">🌱</tspan><tspan dx="10">Always learning something new — see </tspan><tspan fill="#3FB950">currently_exploring</tspan></text>
    <text x="30" y="434"><tspan font-size="16">💬</tspan><tspan dx="10">Ask me about </tspan><tspan fill="#FFBD2E" font-weight="bold">PyTorch, Transformers, or why FastAPI is underrated</tspan></text>
    <text x="30" y="462"><tspan font-size="16">📫</tspan><tspan dx="10" fill="#8B949E">aarushi.vv28@gmail.com</tspan></text>
  </g>

  <!-- blinking cursor -->
  <rect x="176" y="304" width="9" height="16" fill="#3FB950">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
